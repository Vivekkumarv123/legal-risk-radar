<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Risk Radar</title>
    <style>
        :root {
            --bg-main: #060813;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-purple: #8b5cf6;
            --accent-indigo: #6366f1;
            
            --color-high: #ef4444;
            --color-medium: #f59e0b;
            --color-low: #10b981;
        }

        body {
            width: 360px;
            min-height: 480px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Sleek Top Header */
        .header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 14, 30, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 20px;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.3));
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 9px;
            font-weight: 700;
            background: rgba(139, 92, 246, 0.15);
            color: #c084fc;
            padding: 2px 6px;
            border-radius: 9999px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Recent Analysis SaaS Card */
        #lastAnalysisContainer {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 4px 24px rgba(99, 102, 241, 0.1);
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .result-title-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .pulse-indicator.high-risk { background-color: var(--color-high); box-shadow: 0 0 8px var(--color-high); }
        .pulse-indicator.medium-risk { background-color: var(--color-medium); box-shadow: 0 0 8px var(--color-medium); }
        .pulse-indicator.low-risk { background-color: var(--color-low); box-shadow: 0 0 8px var(--color-low); }

        .result-time {
            font-size: 10px;
            opacity: 0.75;
        }

        .score-pill {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            width: fit-content;
        }

        .score-pill.high-risk { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.25); }
        .score-pill.medium-risk { background: rgba(245, 158, 11, 0.15); color: #fde047; border: 1px solid rgba(245, 158, 11, 0.25); }
        .score-pill.low-risk { background: rgba(16, 185, 129, 0.15); color: #a7f3d0; border: 1px solid rgba(16, 185, 129, 0.25); }

        .summary-text {
            font-size: 12px;
            line-height: 1.5;
            color: #d1d5db;
        }

        /* Buttons & Actions */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 11px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.35);
            filter: brightness(1.05);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #e5e7eb;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* Grid Quick Actions */
        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin: 4px 0 0 0;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .quick-btn {
            padding: 10px 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #d1d5db;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .quick-btn:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .quick-btn-icon {
            font-size: 14px;
        }

        /* Status Blocks */
        #status {
            animation: fadeIn 0.3s ease;
        }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.4;
            font-weight: 500;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #a7f3d0;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        .status.info {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.25);
            color: #c7d2fe;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            text-align: center;
            padding: 24px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid var(--accent-indigo);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
            margin: 0 auto 12px;
        }

        .loading-text {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer {
            padding: 14px 20px;
            text-align: center;
            font-size: 10px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            background: rgba(10, 14, 30, 0.3);
            line-height: 1.4;
        }

        .footer a {
            color: var(--accent-indigo);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-wrap">
            <span class="logo-icon">⚖️</span>
            <span class="logo-text">Legal Risk Radar</span>
        </div>
        <span class="version-badge">Live v2.1</span>
    </div>

    <div class="content">
        <!-- Dynamic Result Card -->
        <div id="lastAnalysisContainer"></div>

        <!-- Action Panel -->
        <div class="action-buttons">
            <button id="analyzeBtn" class="btn btn-primary">
                <span>🔍</span> Analyze Selected Text
            </button>
            
            <button id="openAppBtn" class="btn btn-secondary">
                <span>🚀</span> Register for Full Access
            </button>
        </div>

        <div id="status"></div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing highlighted text...</div>
        </div>

        <!-- Quick Tools Section -->
        <h4 class="section-title">Quick Actions</h4>
        <div class="quick-actions">
            <button id="contractCheck" class="quick-btn">
                <span class="quick-btn-icon">📄</span>
                <span>Contract Check</span>
            </button>
            <button id="legalGlossary" class="quick-btn">
                <span class="quick-btn-icon">📚</span>
                <span>Legal Terms</span>
            </button>
            <button id="complianceCheck" class="quick-btn">
                <span class="quick-btn-icon">✅</span>
                <span>Compliance</span>
            </button>
            <button id="voiceAnalysis" class="quick-btn">
                <span class="quick-btn-icon">🎤</span>
                <span>Voice Query</span>
            </button>
        </div>
    </div>

    <div class="footer">
        Highlight contract text and click Analyze. <br> Powered by Gemini 3.1 AI models.
    </div>

    <script src="popup.js"></script>
</body>
</html>
